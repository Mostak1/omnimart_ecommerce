name: Deploy to cPanel via FTP

on:
    push:
        branches:
            - sathi_ecom

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.techseba.com
          username: sathi_ecom@sathysfashion.com
          password: sathi_ecom_techseba
          port: 21
          server-dir: sathysfashion.com/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/node_modules/**
            **/vendor/**
            **/.env
